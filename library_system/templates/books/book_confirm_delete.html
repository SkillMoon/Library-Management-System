{% extends 'base.html' %}
{% block title %}حذف کتاب{% endblock %}
{% block nav_books %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h4 class="page-title">حذف کتاب</h4>
</div>

<div class="card">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
        <h5 class="mt-3">آیا از حذف این کتاب مطمئن هستید؟</h5>
        <p class="text-muted">
            <strong>{{ book.title }}</strong> — نوشته {{ book.author }}
        </p>
        <p class="text-danger small">این عملیات قابل بازگشت نیست.</p>
        <div class="d-flex justify-content-center gap-3 mt-4">
            <form method="post">
                {% csrf_token %}
                <br>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline btn-outline-primary">بله، حذف کن</button>
                    <a href="{% url 'books:book_detail' book.pk %}"
                       class="btn btn-outline-red">انصراف</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
