<header class="header" role="banner">
  <div class="header__left">
    <button id="menu-toggle"
            class="btn btn-icon hide-on-mobile "
            aria-label="باز/بسته کردن منوی کناری">
      ☰
    </button>
    <a href="{% url 'accounts:dashboard' %}">
        {% load static %}
      <img src="{% static 'images/logo.webp' %}"
           alt="لوگوی دانشگاه"
           class="header__logo">
    </a>
  </div>
  <div class="header__right">
    <span class="header__user">
        <a href="{% url 'accounts:profile' %}" style="color:#fff" class="header__user underline">سلام، {{ user.first_name }} {{ user.last_name }}  </a>
        <a href="{% url 'accounts:logout' %}"
        class="header__user underline" style="color:#fff">
      خروج
    </a>
    </span>
  </div>
</header>
