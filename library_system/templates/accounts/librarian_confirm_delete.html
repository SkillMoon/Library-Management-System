{% extends 'base.html' %}
{% block title %}حذف کتابدار{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">تأیید حذف</div>
        <div class="card-body">
            <p>آیا از حذف کتابدار
                <strong>{{ librarian.get_full_name }}</strong>
                اطمینان دارید؟
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline btn-outline-primary">بله، حذف کن</button>
                    <a href="{% url 'accounts:librarian_list' %}"
                       class="btn btn-outline-red">انصراف</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}
