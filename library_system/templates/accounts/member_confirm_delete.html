{% extends 'base.html' %}
{% block title %}حذف عضو{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">تأیید حذف</div>
        <div class="card-body">
            <p>آیا از حذف کاربر
                <strong>{{ member.get_full_name }}</strong>
                ({{ member.get_role_display }}) اطمینان دارید؟
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">بله، حذف کن</button>
                    <a href="{% url 'accounts:member_list' %}"
                       class="btn btn-secondary">انصراف</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}
