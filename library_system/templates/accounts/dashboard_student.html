{% extends 'base.html' %}
{% block title %}داشبورد دانشجو{% endblock %}
{% block nav_dashboard %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h4>خوش آمدید، {{ user.get_full_name|default:user.username }}</h4>
    <span class="badge bg-danger">دانشجو</span>
</div>

<div class="row g-4 mt-1">

    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-book fs-4 text-primary"></i>
                    <h6 class="mb-0">کتاب‌ها</h6>
                </div>
                <div class="d-flex flex-column gap-2">
                    <a href="{% url 'books:book_list' %}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-search me-1"></i> جستجوی کتاب
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-send fs-4 text-info"></i>
                    <h6 class="mb-0">امانت ها</h6>
                </div>
                <div class="d-flex flex-column gap-2">
                    <a href="{% url 'borrowing:borrow_request_create' %}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-plus-circle me-1"></i> ثبت درخواست جدید
                    </a>
                    <a href="{% url 'borrowing:my_requests' %}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-send me-1"></i> درخواست‌های من
                    </a>
                    <a href="{% url 'borrowing:my_borrows' %}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-bookmark-check me-1"></i> امانت‌های من
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
