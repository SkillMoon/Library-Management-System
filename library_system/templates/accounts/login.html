{% load static %}
<html lang="fa" dir="rtl">
<head>
  <title>ورود به سامانه</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="{% static 'css/style.css' %}">


{% block content %}
<div class="login-page">
  <div class="login-container" role="form" aria-labelledby="login-heading">
    <h2 id="login-heading">ورود به سامانه</h2>
    {% if form.errors %}
      <div class="alert alert-danger" role="alert">
        {{form.errors}}
      </div>
    {% endif %}
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="{{ form.username.id_for_label }}">نام کاربری</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label for="{{ form.password.id_for_label }}">رمز عبور</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary">ورود</button>
    </form>
  </div>
</div>
</head>
{% endblock %}
