<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ورود به سیستم</title>
</head>
<body>
    <h2>ورود به سیستم کتابخانه</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">ورود</button>
    </form>
    {% if form.errors %}
        <p style="color:red">نام کاربری یا رمز عبور اشتباه است.</p>
    {% endif %}
</body>
</html>
